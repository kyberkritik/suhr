@import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600;700&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&display=swap");

:root {
  --bg-0: #081018;
  --bg-1: #13253a;
  --bg-2: #35263a;
  --panel: rgba(10, 19, 30, 0.82);
  --panel-soft: rgba(255, 255, 255, 0.08);
  --line: rgba(255, 255, 255, 0.14);
  --ink: #f8f1e2;
  --ink-soft: rgba(248, 241, 226, 0.72);
  --accent: #efb35a;
  --accent-cool: #7cc6d9;
  --series-1: #c4672f;
  --series-2: #2551b6;
  --series-3: #0d7668;
  --series-4: #8a2d1b;
  --series-5: #79611c;
  --series-6: #725e4d;
  --shadow: 0 30px 90px rgba(0, 0, 0, 0.4);
  --radius-xl: 34px;
  --radius-lg: 24px;
  --radius-md: 18px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  height: 100%;
}

body {
  overflow: hidden;
  color: var(--ink);
  font-family: "IBM Plex Sans Condensed", "Avenir Next Condensed", sans-serif;
  background:
    radial-gradient(circle at top left, rgba(122, 198, 217, 0.16), transparent 26%),
    radial-gradient(circle at top right, rgba(239, 179, 90, 0.18), transparent 28%),
    linear-gradient(140deg, #071018 0%, #112033 38%, #1f2035 68%, #341d2e 100%);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(90deg, transparent 0 56px, rgba(255, 255, 255, 0.018) 56px 57px),
    repeating-linear-gradient(180deg, transparent 0 56px, rgba(255, 255, 255, 0.02) 56px 57px);
  opacity: 0.45;
}

button,
a {
  color: inherit;
  font: inherit;
}

.page {
  position: relative;
  height: 100%;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
}

.topbar {
  position: relative;
  z-index: 5;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
  padding: 28px 24px 18px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  background: linear-gradient(180deg, rgba(8, 16, 24, 0.84), rgba(8, 16, 24, 0.48));
  backdrop-filter: blur(20px);
}

.topbar::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 10px;
  background: linear-gradient(
    90deg,
    var(--series-1) 0 18%,
    var(--series-2) 18% 36%,
    var(--series-3) 36% 54%,
    var(--series-4) 54% 72%,
    var(--series-5) 72% 86%,
    var(--series-6) 86% 100%
  );
}

.brand small {
  display: block;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 0.76rem;
}

.brand strong {
  display: block;
  font-family: "Fraunces", Georgia, serif;
  font-size: clamp(1.4rem, 2vw, 2rem);
  letter-spacing: -0.03em;
  line-height: 1.02;
}

.topbar-actions {
  display: flex;
  align-items: center;
  gap: 12px;
}

.view-switcher {
  display: inline-flex;
  gap: 8px;
  padding: 7px;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.08);
}

.view-switcher button,
.back-link {
  border: 0;
  border-radius: 999px;
  padding: 10px 16px;
  background: transparent;
  text-decoration: none;
  cursor: pointer;
}

.view-switcher button.is-active {
  background: rgba(255, 255, 255, 0.94);
  color: #0e1822;
}

.back-link {
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(255, 255, 255, 0.09);
}

.viewport {
  position: relative;
  padding: 18px;
  min-height: 0;
}

.view {
  position: absolute;
  inset: 18px;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: opacity 180ms ease, transform 180ms ease;
}

.view.is-active {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.flow-shell,
.quilt-shell {
  position: relative;
  width: 100%;
  height: 100%;
  overflow: hidden;
  border-radius: var(--radius-xl);
  border: 1px solid rgba(255, 255, 255, 0.12);
  background:
    linear-gradient(180deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.03)),
    radial-gradient(circle at center, rgba(124, 198, 217, 0.1), transparent 45%),
    radial-gradient(circle at bottom center, rgba(239, 179, 90, 0.08), transparent 40%),
    rgba(6, 13, 22, 0.72);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.flow-stage {
  position: absolute;
  inset: 26px 24px 188px;
  overflow: hidden;
  perspective: 1800px;
  transform-style: preserve-3d;
}

.flow-stage::before {
  content: "";
  position: absolute;
  inset: auto 6% 18px 6%;
  height: 18%;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(239, 179, 90, 0.22), transparent 70%);
  filter: blur(24px);
}

.flow-card {
  position: absolute;
  left: 50%;
  top: 52%;
  margin: 0;
  padding: 0;
  aspect-ratio: 0.64;
  border: 0;
  border-radius: 0;
  overflow: hidden;
  background: transparent;
  box-shadow: 0 22px 40px rgba(0, 0, 0, 0.34);
  cursor: pointer;
  transition: transform 280ms ease, opacity 220ms ease, box-shadow 220ms ease;
}

.flow-card img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.quilt-card img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.flow-card::before {
  content: none;
}

.flow-card::after {
  content: none;
}

.flow-card.is-active {
  box-shadow: 0 28px 56px rgba(0, 0, 0, 0.42);
}

.flow-hud {
  position: absolute;
  inset: auto 24px 24px;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 220px;
  gap: 18px;
  align-items: end;
}

.info-panel,
.wheel-panel {
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 26px;
  background: rgba(4, 10, 18, 0.7);
  backdrop-filter: blur(16px);
}

.info-panel {
  padding: 18px 20px;
}

.info-kicker {
  margin: 0;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.16em;
  font-size: 0.78rem;
}

.info-panel h2 {
  margin: 8px 0 4px;
  font-family: "Fraunces", Georgia, serif;
  font-size: clamp(1.6rem, 2.1vw, 2.3rem);
  line-height: 1.02;
  letter-spacing: -0.03em;
}

.info-author,
.info-fine {
  margin: 0;
  color: var(--ink-soft);
  font-size: 1rem;
}

.info-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.info-meta span,
.status-pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  padding: 7px 10px;
  background: rgba(255, 255, 255, 0.06);
  font-size: 0.9rem;
}

.wheel-panel {
  display: grid;
  place-items: center;
  padding: 18px;
  min-height: 180px;
}

.wheel {
  position: relative;
  width: 132px;
  aspect-ratio: 1;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, rgba(255, 255, 255, 0.9) 0 21%, transparent 21%),
    radial-gradient(circle at 35% 28%, rgba(255, 255, 255, 0.84), rgba(226, 227, 230, 0.92));
  box-shadow:
    inset 0 10px 20px rgba(255, 255, 255, 0.5),
    inset 0 -10px 18px rgba(0, 0, 0, 0.1),
    0 16px 30px rgba(0, 0, 0, 0.26);
}

.wheel-label {
  position: absolute;
  color: rgba(13, 20, 28, 0.72);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
}

.wheel-label--top { top: 18px; left: 50%; transform: translateX(-50%); }
.wheel-label--bottom { bottom: 16px; left: 50%; transform: translateX(-50%); }
.wheel-label--left { top: 50%; left: 16px; transform: translateY(-50%); }
.wheel-label--right { top: 50%; right: 16px; transform: translateY(-50%); }

.quilt-stage {
  position: absolute;
  inset: 24px;
  overflow: hidden;
}

.quilt-card {
  position: absolute;
  margin: 0;
  padding: 0;
  border: 0;
  border-radius: 0;
  overflow: visible;
  background: transparent;
  box-shadow: none;
  cursor: pointer;
  transition: transform 160ms ease, filter 160ms ease;
}

.quilt-card:hover,
.quilt-card:focus-visible {
  transform: translateY(-3px) scale(1.01);
  filter: brightness(1.08);
}

.quilt-card::after {
  content: none;
}

.status-pill {
  position: absolute;
  top: 24px;
  right: 24px;
  z-index: 2;
}

.tooltip {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 30;
  min-width: 220px;
  max-width: min(34ch, calc(100vw - 24px));
  padding: 12px 14px;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 16px;
  background: rgba(4, 10, 18, 0.9);
  color: var(--ink);
  box-shadow: 0 18px 36px rgba(0, 0, 0, 0.32);
  backdrop-filter: blur(18px);
  pointer-events: none;
  opacity: 0;
  transform: translate(-999px, -999px);
  transition: opacity 120ms ease;
}

.tooltip.is-visible {
  opacity: 1;
}

.tooltip strong {
  display: block;
  font-family: "Fraunces", Georgia, serif;
  font-size: 1.05rem;
  line-height: 1.1;
}

.tooltip span {
  display: block;
  margin-top: 4px;
  color: var(--ink-soft);
}

@media (max-width: 1100px) {
  .flow-hud {
    grid-template-columns: 1fr;
  }

  .wheel-panel {
    display: none;
  }
}

@media (max-width: 760px) {
  body {
    overflow: auto;
  }

  .page {
    min-height: 100%;
  }

  .topbar {
    flex-direction: column;
    align-items: stretch;
  }

  .topbar-actions {
    flex-wrap: wrap;
  }

  .viewport {
    min-height: 960px;
  }

  .view {
    inset: 12px;
  }

  .flow-stage {
    inset: 18px 18px 260px;
  }

  .quilt-stage {
    inset: 18px;
  }
}
</style>

const state = {
  view: "flow",
  activeIndex: 0,
  hoverIndex: null,
};

const tooltip = document.querySelector("#tooltip");
const infoPanel = document.querySelector("#info-panel");
const flowStage = document.querySelector("#flow-stage");
const quiltStage = document.querySelector("#quilt-stage");
const flowStatus = document.querySelector("#flow-status");
const quiltStatus = document.querySelector("#quilt-status");

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function wrapIndex(index) {
  const total = BOOKS.length;
  return (index + total) % total;
}

function circularDistance(index, activeIndex) {
  const total = BOOKS.length;
  let distance = index - activeIndex;
  if (distance > total / 2) {
    distance -= total;
  }
  if (distance < -total / 2) {
    distance += total;
  }
  return distance;
}

function currentBook() {
  const index = state.hoverIndex ?? state.activeIndex;
  return BOOKS[index];
}

function tooltipMarkup(book) {
  return `
    <strong>${escapeHtml(book.title)}</strong>
    <span>${escapeHtml(book.creator_label)}</span>
    <span>${escapeHtml([book.year_label, book.series_line].filter(Boolean).join(" · "))}</span>
  `;
}

function showTooltip(book, event) {
  tooltip.innerHTML = tooltipMarkup(book);
  tooltip.classList.add("is-visible");
  moveTooltip(event);
}

function moveTooltip(event) {
  if (!tooltip.classList.contains("is-visible")) {
    return;
  }
  const gap = 18;
  const rect = tooltip.getBoundingClientRect();
  let x = event.clientX + gap;
  let y = event.clientY + gap;
  if (x + rect.width + 8 > window.innerWidth) {
    x = event.clientX - rect.width - gap;
  }
  if (y + rect.height + 8 > window.innerHeight) {
    y = event.clientY - rect.height - gap;
  }
  tooltip.style.transform = `translate(${x}px, ${y}px)`;
}

function hideTooltip() {
  tooltip.classList.remove("is-visible");
  tooltip.style.transform = "translate(-999px, -999px)";
}

function infoMarkup(book) {
  const meta = [book.year_label, book.edition, book.pages_label].filter(Boolean);
  return `
    <p class="info-kicker">${escapeHtml(book.series_line)}</p>
    <h2>${escapeHtml(book.title)}</h2>
    <p class="info-author">${escapeHtml(book.creator_label)}</p>
    <div class="info-meta">
      ${meta.map((item) => `<span>${escapeHtml(item)}</span>`).join("")}
    </div>
    <p class="info-fine">${escapeHtml(book.publisher_display || "")}</p>
  `;
}

function renderInfoPanel() {
  infoPanel.innerHTML = infoMarkup(currentBook());
  flowStatus.textContent = `${state.activeIndex + 1} / ${BOOKS.length}`;
}

function attachInteractiveHandlers(node, index) {
  const book = BOOKS[index];
  node.addEventListener("mouseenter", (event) => {
    state.hoverIndex = index;
    renderInfoPanel();
    showTooltip(book, event);
  });
  node.addEventListener("mousemove", (event) => {
    moveTooltip(event);
  });
  node.addEventListener("mouseleave", () => {
    state.hoverIndex = null;
    hideTooltip();
    renderInfoPanel();
  });
  node.addEventListener("focus", () => {
    state.hoverIndex = index;
    renderInfoPanel();
  });
  node.addEventListener("blur", () => {
    state.hoverIndex = null;
    renderInfoPanel();
    hideTooltip();
  });
}

function renderFlow() {
  flowStage.innerHTML = "";
  const stageWidth = flowStage.clientWidth;
  const coverWidth = Math.min(Math.max(stageWidth * 0.14, 120), 290);
  const spread = Math.min(stageWidth * 0.19, 230);

  BOOKS.forEach((book, index) => {
    const distance = circularDistance(index, state.activeIndex);
    const absolute = Math.abs(distance);
    if (absolute > 7) {
      return;
    }

    const card = document.createElement("button");
    card.type = "button";
    card.className = `flow-card${absolute === 0 ? " is-active" : ""}`;
    card.style.width = `${coverWidth}px`;

    const x = distance * spread + Math.sign(distance || 1) * absolute * 10;
    const y = absolute === 0 ? -58 : -22 + absolute * 14;
    const z = absolute === 0 ? 120 : -absolute * 90;
    const rotate = absolute === 0 ? 0 : (distance < 0 ? 58 : -58);
    const scale = absolute === 0 ? 1 : Math.max(0.5, 0.92 - absolute * 0.09);
    const opacity = Math.max(0, 1 - absolute * 0.14);
    const saturate = absolute === 0 ? 1 : Math.max(0.7, 1 - absolute * 0.06);

    card.style.opacity = String(opacity);
    card.style.zIndex = String(100 - absolute);
    card.style.filter = `saturate(${saturate}) brightness(${absolute === 0 ? 1 : 0.94})`;
    card.style.transform = `translate3d(calc(-50% + ${x}px), calc(-50% + ${y}px), ${z}px) rotateY(${rotate}deg) scale(${scale})`;
    card.innerHTML = `<img loading="lazy" src="${escapeHtml(book.cover_url)}" alt="Portada de ${escapeHtml(book.title)}">`;

    attachInteractiveHandlers(card, index);
    card.addEventListener("click", () => {
      state.activeIndex = index;
      state.hoverIndex = null;
      renderFlow();
      hideTooltip();
    });
    flowStage.append(card);
  });

  renderInfoPanel();
}

function interleaveBySeries(list) {
  const buckets = new Map();
  list.forEach((book) => {
    if (!buckets.has(book.series)) {
      buckets.set(book.series, []);
    }
    buckets.get(book.series).push(book);
  });
  const result = [];
  while (result.length < list.length) {
    let pushed = false;
    for (const bucket of buckets.values()) {
      if (bucket.length) {
        result.push(bucket.shift());
        pushed = true;
      }
    }
    if (!pushed) {
      break;
    }
  }
  return result;
}

const QUILT_BOOKS = interleaveBySeries(BOOKS);

function quiltItems() {
  return QUILT_BOOKS.map((book, position) => ({
    book,
    weight: 1 + (((position + 1) * 11 + book.series_order * 7 + book.pages) % 10) / 22,
  }));
}

function chooseSplit(items) {
  const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
  let cumulative = 0;
  let bestIndex = 1;
  let bestDiff = Number.POSITIVE_INFINITY;

  for (let index = 1; index < items.length; index += 1) {
    cumulative += items[index - 1].weight;
    const diff = Math.abs(totalWeight / 2 - cumulative);
    if (diff < bestDiff) {
      bestDiff = diff;
      bestIndex = index;
    }
  }
  return bestIndex;
}

function partitionItems(items, x, y, width, height) {
  if (!items.length) {
    return [];
  }
  if (items.length === 1) {
    return [{ book: items[0].book, x, y, width, height }];
  }

  const gap = Math.max(4, Math.min(14, Math.round(Math.min(width, height) * 0.018)));
  const splitIndex = chooseSplit(items);
  const left = items.slice(0, splitIndex);
  const right = items.slice(splitIndex);

  const leftWeight = left.reduce((sum, item) => sum + item.weight, 0);
  const rightWeight = right.reduce((sum, item) => sum + item.weight, 0);
  const totalWeight = leftWeight + rightWeight;
  const vertical = width >= height;

  if (vertical) {
    const availableWidth = Math.max(40, width - gap);
    const leftWidth = Math.max(28, availableWidth * (leftWeight / totalWeight));
    const rightWidth = Math.max(28, width - leftWidth - gap);
    return [
      ...partitionItems(left, x, y, leftWidth, height),
      ...partitionItems(right, x + leftWidth + gap, y, rightWidth, height),
    ];
  }

  const availableHeight = Math.max(40, height - gap);
  const topHeight = Math.max(28, availableHeight * (leftWeight / totalWeight));
  const bottomHeight = Math.max(28, height - topHeight - gap);
  return [
    ...partitionItems(left, x, y, width, topHeight),
    ...partitionItems(right, x, y + topHeight + gap, width, bottomHeight),
  ];
}

function renderQuilt() {
  quiltStage.innerHTML = "";
  const rect = quiltStage.getBoundingClientRect();
  const inset = Math.max(10, Math.min(18, Math.round(Math.min(rect.width, rect.height) * 0.012)));
  const width = Math.max(10, rect.width - inset * 2);
  const height = Math.max(10, rect.height - inset * 2);
  const frames = partitionItems(quiltItems(), inset, inset, width, height);

  frames.forEach((frame) => {
    const card = document.createElement("button");
    card.type = "button";
    card.className = "quilt-card";
    card.style.left = `${frame.x}px`;
    card.style.top = `${frame.y}px`;
    card.style.width = `${frame.width}px`;
    card.style.height = `${frame.height}px`;

    card.innerHTML = `<img loading="lazy" src="${escapeHtml(frame.book.cover_url)}" alt="Portada de ${escapeHtml(frame.book.title)}">`;
    attachInteractiveHandlers(card, frame.book.index);
    card.addEventListener("click", () => {
      state.activeIndex = frame.book.index;
      state.hoverIndex = null;
      setView("flow");
      hideTooltip();
    });
    quiltStage.append(card);
  });

  quiltStatus.textContent = `${BOOKS.length} portadas`;
}

function setView(viewName) {
  state.view = viewName;
  document.querySelectorAll("[data-view-target]").forEach((button) => {
    button.classList.toggle("is-active", button.dataset.viewTarget === viewName);
  });
  document.querySelectorAll("[data-view-panel]").forEach((panel) => {
    panel.classList.toggle("is-active", panel.dataset.viewPanel === viewName);
  });
  hideTooltip();
  if (viewName === "quilt") {
    requestAnimationFrame(renderQuilt);
  } else {
    requestAnimationFrame(renderFlow);
  }
}

document.querySelectorAll("[data-view-target]").forEach((button) => {
  button.addEventListener("click", () => {
    setView(button.dataset.viewTarget || "flow");
  });
});

document.addEventListener("keydown", (event) => {
  if (event.key === "ArrowLeft") {
    event.preventDefault();
    state.activeIndex = wrapIndex(state.activeIndex - 1);
    state.hoverIndex = null;
    renderFlow();
    return;
  }
  if (event.key === "ArrowRight") {
    event.preventDefault();
    state.activeIndex = wrapIndex(state.activeIndex + 1);
    state.hoverIndex = null;
    renderFlow();
    return;
  }
  if (event.key === "1") {
    setView("flow");
    return;
  }
  if (event.key === "2") {
    setView("quilt");
  }
});

window.addEventListener("resize", () => {
  renderFlow();
  renderQuilt();
});

renderFlow();
renderQuilt();

  </script>
</body>
