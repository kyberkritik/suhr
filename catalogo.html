<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bibliotheca Cardiel · Catálogo Suhrkamp</title>
  <meta name="description" content="Catálogo en tarjetas de la Colección Suhrkamp de Bibliotheca Cardiel.">
  <style>
@import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;600;700&family=IBM+Plex+Sans+Condensed:wght@400;500;600;700&display=swap");

:root {
  --paper: #f4efe7;
  --paper-deep: #ece1cf;
  --ink: #181411;
  --ink-soft: #5e5349;
  --ink-faint: #9e8e82;
  --line: rgba(53, 39, 27, 0.14);
  --card-bg: rgba(255, 252, 246, 0.96);
  --accent: #914d1b;
  --shadow-sm: 0 2px 8px rgba(70, 46, 25, 0.07);
  --shadow-md: 0 8px 28px rgba(70, 46, 25, 0.13);
  --shadow-lg: 0 28px 64px rgba(70, 46, 25, 0.22);
  --header-h: 60px;
  --footer-h: 44px;
  --stw-c: #2551b6;
  --st-c:  #c4672f;
  --es-c:  #0d7668;
  --bb-c:  #8a2d1b;
  --es-sd-c: #79611c;
  --other-c: #725e4d;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; height: 100%; }

body {
  min-height: 100%;
  font-family: "IBM Plex Sans Condensed", "Avenir Next Condensed", "Arial Narrow", sans-serif;
  background:
    radial-gradient(ellipse at top left, rgba(201,98,45,.16) 0%, transparent 38%),
    radial-gradient(ellipse at top right, rgba(20,84,92,.15) 0%, transparent 30%),
    linear-gradient(180deg, #f5f0e7 0%, #ede3d3 60%, #e7daca 100%);
  background-attachment: fixed;
  color: var(--ink);
}

/* ===== HEADER ===== */
.site-header {
  position: sticky;
  top: 0;
  z-index: 200;
  height: var(--header-h);
  background: rgba(244, 239, 231, 0.92);
  backdrop-filter: blur(16px) saturate(1.3);
  border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 12px rgba(70,46,25,.08);
}

.header-inner {
  height: 100%;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 16px;
  padding: 0 20px;
  max-width: 100%;
}

.header-brand {
  display: flex;
  flex-direction: column;
  line-height: 1.15;
  white-space: nowrap;
}
.header-owner {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-soft);
}
.header-section {
  font-family: "Fraunces", Georgia, serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--ink);
}

.header-search-wrap {
  position: relative;
  max-width: 460px;
  width: 100%;
  justify-self: center;
}
.header-search {
  width: 100%;
  height: 36px;
  padding: 0 12px 0 36px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.72);
  font-family: inherit;
  font-size: 0.88rem;
  color: var(--ink);
  outline: none;
  transition: border-color 120ms, box-shadow 120ms;
}
.header-search:focus {
  border-color: rgba(53,39,27,.28);
  box-shadow: 0 0 0 3px rgba(145,77,27,.12);
}
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  opacity: 0.45;
  pointer-events: none;
}

.header-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  white-space: nowrap;
}
.sort-select {
  height: 32px;
  padding: 0 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,.6);
  font-family: inherit;
  font-size: 0.82rem;
  color: var(--ink-soft);
  cursor: pointer;
  outline: none;
}
.book-count-badge {
  font-size: 0.78rem;
  color: var(--ink-faint);
  font-weight: 600;
}

/* ===== FILTER BAR ===== */
.filter-bar {
  position: sticky;
  top: var(--header-h);
  z-index: 190;
  padding: 8px 16px;
  background: rgba(244, 239, 231, 0.88);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
  display: flex;
  gap: 6px;
  flex-wrap: nowrap;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
  flex-shrink: 0;
  height: 28px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: rgba(255,255,255,.5);
  font-family: inherit;
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 100ms, color 100ms, border-color 100ms;
  white-space: nowrap;
}
.filter-btn:hover {
  background: rgba(255,255,255,.85);
  color: var(--ink);
}
.filter-btn.is-active {
  background: var(--ink);
  color: var(--paper);
  border-color: transparent;
}
.filter-btn.series--suhrkamp-taschenbuch-wissenschaft.is-active { background: var(--stw-c); }
.filter-btn.series--suhrkamp-taschenbuch.is-active { background: var(--st-c); }
.filter-btn.series--edition-suhrkamp.is-active { background: var(--es-c); }
.filter-btn.series--suhrkamp-basisbibliothek.is-active { background: var(--bb-c); }
.filter-btn.series--edition-suhrkamp-sonderdruck.is-active { background: var(--es-sd-c); }
.filter-count { opacity: 0.65; font-weight: 400; }

/* ===== CATALOG GRID ===== */
.catalog-main {
  padding: 16px;
  min-height: calc(100vh - var(--header-h) - var(--footer-h) - 44px);
}

.book-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 14px;
}

.no-results {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 24px;
  color: var(--ink-faint);
  font-size: 1rem;
}

/* ===== BOOK CARD ===== */
.book-card {
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--line);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 140ms ease, box-shadow 140ms ease;
  box-shadow: var(--shadow-sm);
}
.book-card:hover {
  transform: translateY(-4px) scale(1.015);
  box-shadow: var(--shadow-md);
  z-index: 2;
}
.book-card:focus-visible {
  outline: 3px solid var(--accent);
  outline-offset: 2px;
}

/* Series accent strip */
.card-accent {
  height: 4px;
  background: var(--series-c, var(--other-c));
}
.book-card.series--suhrkamp-taschenbuch-wissenschaft .card-accent { background: var(--stw-c); }
.book-card.series--suhrkamp-taschenbuch .card-accent { background: var(--st-c); }
.book-card.series--edition-suhrkamp .card-accent { background: var(--es-c); }
.book-card.series--suhrkamp-basisbibliothek .card-accent { background: var(--bb-c); }
.book-card.series--edition-suhrkamp-sonderdruck .card-accent { background: var(--es-sd-c); }
.book-card.series--sin-serie .card-accent { background: var(--other-c); }

/* Cover */
.card-cover-wrap {
  position: relative;
  width: 100%;
  aspect-ratio: 3 / 4;
  overflow: hidden;
  background: var(--paper-deep);
}
.card-cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 200ms;
}
.card-cover.is-loading { opacity: 0; }

.card-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 16px 12px;
  text-align: center;
  background: var(--ph-bg, var(--other-c));
  color: rgba(255,255,255,0.92);
}
.book-card.series--suhrkamp-taschenbuch-wissenschaft .card-placeholder { background: var(--stw-c); }
.book-card.series--suhrkamp-taschenbuch .card-placeholder { background: var(--st-c); }
.book-card.series--edition-suhrkamp .card-placeholder { background: var(--es-c); }
.book-card.series--suhrkamp-basisbibliothek .card-placeholder { background: var(--bb-c); }
.book-card.series--edition-suhrkamp-sonderdruck .card-placeholder { background: var(--es-sd-c); }
.book-card.series--sin-serie .card-placeholder { background: var(--other-c); }

.ph-badge {
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.65;
  margin-bottom: 10px;
}
.ph-title {
  font-family: "Fraunces", Georgia, serif;
  font-size: 0.85rem;
  font-weight: 600;
  line-height: 1.25;
  margin-bottom: 8px;
}
.ph-author {
  font-size: 0.7rem;
  opacity: 0.75;
  line-height: 1.3;
}

/* Card info block */
.card-info {
  padding: 9px 10px 10px;
}
.card-apa {
  font-size: 0.69rem;
  line-height: 1.42;
  color: var(--ink-soft);
}
.card-apa em {
  font-style: italic;
  color: var(--ink);
  font-weight: 600;
}
.card-series-badge {
  display: inline-block;
  margin-top: 5px;
  font-size: 0.6rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 2px 6px;
  border-radius: 4px;
  background: var(--paper-deep);
  color: var(--ink-faint);
}

/* ===== MODAL ===== */
.modal-backdrop {
  position: fixed;
  inset: 0;
  z-index: 900;
  background: rgba(24, 20, 17, 0.55);
  backdrop-filter: blur(10px) saturate(1.2);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fade-in 140ms ease;
}
.modal-backdrop.is-hidden { display: none; }

@keyframes fade-in {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  position: relative;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  max-width: 860px;
  width: 100%;
  max-height: 92vh;
  overflow-y: auto;
  animation: slide-up 160ms ease;
  scrollbar-width: thin;
  scrollbar-color: rgba(53,39,27,.2) transparent;
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(18px); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-close {
  position: sticky;
  top: 0;
  float: right;
  margin: 12px 12px -44px 0;
  z-index: 10;
  width: 32px;
  height: 32px;
  border: none;
  border-radius: 50%;
  background: rgba(24,20,17,.12);
  color: var(--ink);
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 100ms;
}
.modal-close:hover { background: rgba(24,20,17,.22); }

.modal-body {
  display: grid;
  grid-template-columns: 220px 1fr;
  gap: 0;
}

.modal-cover-col {
  padding: 28px 0 28px 28px;
}
.modal-cover {
  width: 100%;
  border-radius: 8px;
  box-shadow: var(--shadow-md);
  display: block;
}
.modal-cover-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  text-align: center;
  color: rgba(255,255,255,.9);
  font-size: 0.8rem;
  line-height: 1.4;
}
.modal-cover-credit {
  margin-top: 8px;
  font-size: 0.65rem;
  color: var(--ink-faint);
  line-height: 1.4;
}

.modal-nav {
  display: flex;
  gap: 8px;
  margin-top: 14px;
}
.modal-nav-btn {
  flex: 1;
  height: 30px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255,255,255,.5);
  font-family: inherit;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--ink-soft);
  cursor: pointer;
  transition: background 100ms;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.modal-nav-btn:hover { background: rgba(255,255,255,.9); }
.modal-nav-btn:disabled { opacity: .35; cursor: default; }

.modal-detail-col {
  padding: 28px 28px 28px 24px;
}

.modal-series-line {
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.modal-title {
  font-family: "Fraunces", Georgia, serif;
  font-size: clamp(1.1rem, 2.5vw, 1.6rem);
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.modal-subtitle {
  font-size: 0.82rem;
  color: var(--ink-soft);
  margin-bottom: 14px;
}

.modal-apa {
  background: rgba(53,39,27,.05);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  padding: 10px 14px;
  font-size: 0.78rem;
  line-height: 1.55;
  color: var(--ink-soft);
  margin-bottom: 18px;
}
.modal-apa em { font-style: italic; color: var(--ink); }

.modal-meta {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 5px 14px;
  font-size: 0.78rem;
  margin-bottom: 16px;
}
.modal-meta dt {
  color: var(--ink-faint);
  font-weight: 700;
  white-space: nowrap;
}
.modal-meta dd {
  color: var(--ink-soft);
}

.modal-section-title {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-faint);
  margin-bottom: 6px;
}
.modal-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-bottom: 14px;
}
.modal-tag {
  font-size: 0.7rem;
  padding: 3px 9px;
  border-radius: 999px;
  background: rgba(53,39,27,.07);
  color: var(--ink-soft);
}
.modal-abstract {
  font-size: 0.8rem;
  line-height: 1.6;
  color: var(--ink-soft);
  margin-bottom: 16px;
}
.modal-attachments {
  font-size: 0.75rem;
  color: var(--ink-faint);
  margin-top: 4px;
}
.modal-attachment-item::before {
  content: "📄 ";
}

/* ===== FOOTER ===== */
.site-footer {
  height: var(--footer-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-top: 1px solid var(--line);
  background: rgba(244,239,231,.8);
  font-size: 0.72rem;
  color: var(--ink-faint);
  gap: 12px;
}
.footer-brand { font-weight: 600; }

/* ===== RESPONSIVE ===== */
@media (max-width: 680px) {
  .book-grid {
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 10px;
  }
  .header-inner {
    grid-template-columns: 1fr auto;
  }
  .header-brand .header-section { font-size: 0.9rem; }
  .header-search-wrap { display: none; }
  .modal-body {
    grid-template-columns: 1fr;
  }
  .modal-cover-col {
    padding: 20px 20px 0;
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 16px;
    align-items: start;
  }
  .modal-nav { margin-top: 0; }
  .modal-detail-col { padding: 16px 20px 20px; }
  .modal-title { font-size: 1.1rem; }
}

@media (min-width: 1800px) {
  .book-grid { gap: 18px; }
  .catalog-main { padding: 20px; }
}
@media (min-width: 2400px) {
  .book-grid {
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 22px;
  }
  .catalog-main { padding: 24px; }
}
  </style>

    /* ── State ─────────────────────────────────────── */
    let state = {
      query: "",
      series: "all",
      sort: "author",
      filtered: [],
      activeIndex: -1,   // index in filtered array
    };

    /* ── Helpers ───────────────────────────────────── */
    function escHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function normText(str) {
      return String(str ?? "").toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    const SERIES_COLORS = {
      "suhrkamp-taschenbuch-wissenschaft": "var(--stw-c)",
      "suhrkamp-taschenbuch":              "var(--st-c)",
      "edition-suhrkamp":                  "var(--es-c)",
      "suhrkamp-basisbibliothek":          "var(--bb-c)",
      "edition-suhrkamp-sonderdruck":      "var(--es-sd-c)",
    };

    /* ── APA helpers ───────────────────────────────── */
    function fmtPerson(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length <= 1) return name;
      const last = parts[parts.length - 1];
      const firsts = parts.slice(0, -1).join(" ");
      return `${last}, ${firsts}`;
    }

    function buildApaHtml(book) {
      // Use precomputed plain APA from Python, then italicise the title part
      const raw = book.apa7 || "";
      // Find title in raw and wrap in <em>
      const titleEscaped = escHtml(book.title);
      // The Python-generated APA has title as plain text; replace first occurrence
      const safeRaw = escHtml(raw);
      const safeTitle = escHtml(book.title);
      return safeRaw.replace(safeTitle, `<em>${safeTitle}</em>`);
    }

    function shortCreator(book) {
      const primary = book.authors[0] || book.editors[0] || "";
      if (!primary) return "";
      const parts = primary.trim().split(/\s+/);
      return parts[parts.length - 1];
    }

    /* ── Filtering & sorting ───────────────────────── */
    function applyFilters() {
      let list = BOOKS.slice();

      // Search
      if (state.query) {
        const q = normText(state.query);
        list = list.filter(b => {
          const blob = normText(
            [b.title, b.short_title, b.creator_label,
             b.series, b.series_badge, b.primary_isbn,
             ...(b.subjects || []), b.abstract].join(" ")
          );
          return blob.includes(q);
        });
      }

      // Series filter
      if (state.series !== "all") {
        list = list.filter(b => b.series === state.series);
      }

      // Sort
      list.sort((a, b) => {
        if (state.sort === "series") {
          return (a.series_order - b.series_order) ||
                 ((a.series_number ?? 99999) - (b.series_number ?? 99999)) ||
                 a.creator_sort.localeCompare(b.creator_sort);
        }
        if (state.sort === "year-asc")  return (a.year ?? 9999) - (b.year ?? 9999);
        if (state.sort === "year-desc") return (b.year ?? 0)    - (a.year ?? 0);
        if (state.sort === "author")    return a.creator_sort.localeCompare(b.creator_sort);
        if (state.sort === "title")     return a.title_sort.localeCompare(b.title_sort);
        return 0;
      });

      state.filtered = list;
    }

    /* ── Card rendering ────────────────────────────── */

      if (book.cover_url) {
        return `<img class="${cls} is-loading"
          src="${escHtml(book.cover_url)}"
          alt="Portada: ${escHtml(book.title)}"
          loading="lazy"
          onload="this.classList.remove('is-loading')"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <div class="card-placeholder" style="display:none">
          <span class="ph-badge">${escHtml(book.series_badge)}</span>
          <span class="ph-title">${escHtml(book.title)}</span>
          <span class="ph-author">${escHtml(shortCreator(book))}</span>
        </div>`;
      }
      return `<div class="card-placeholder">
        <span class="ph-badge">${escHtml(book.series_badge)}</span>
        <span class="ph-title">${escHtml(book.title)}</span>
        <span class="ph-author">${escHtml(shortCreator(book))}</span>
      </div>`;
    }

    function buildCard(book, filteredIdx) {
      const creator = shortCreator(book);
      const yearPart = book.year_label ? `(${escHtml(book.year_label)})` : "";
      const titlePart = `<em>${escHtml(book.title)}</em>`;
      const pubPart = escHtml(book.publisher_name || "Suhrkamp");
      const apaCard = [
        creator ? escHtml(fmtPerson(book.authors[0] || book.editors[0] || "")) : "",
        yearPart, titlePart + ".", pubPart + "."
      ].filter(Boolean).join(" ");

      return `<article
        class="book-card series--${escHtml(book.series_key)}"
        data-filtered-idx="${filteredIdx}"
        tabindex="0"
        role="button"
        aria-label="Ver ficha: ${escHtml(book.title)}"
      >
        <div class="card-accent"></div>
        <div class="card-cover-wrap">
          ${renderCoverImg(book, "card-cover")}
        </div>
        <div class="card-info">
          <p class="card-apa">${apaCard}</p>
          <span class="card-series-badge">${escHtml(book.series_badge)}</span>
        </div>
      </article>`;
    }

    function renderGrid() {
      applyFilters();
      const grid = document.getElementById("bookGrid");
      const badge = document.getElementById("bookCountBadge");
      const n = state.filtered.length;
      badge.textContent = n === BOOKS.length
        ? `${n} títulos`
        : `${n} de ${BOOKS.length}`;

      if (n === 0) {
        grid.innerHTML = `<p class="no-results">Ningún título coincide con la búsqueda.</p>`;
        return;
      }
      grid.innerHTML = state.filtered.map((b, i) => buildCard(b, i)).join("");

      // Attach click & keyboard
      grid.querySelectorAll(".book-card").forEach(card => {
        card.addEventListener("click", () => openModal(+card.dataset.filteredIdx));
        card.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            openModal(+card.dataset.filteredIdx);
          }
        });
      });
    }

    /* ── Modal ─────────────────────────────────────── */
    function buildModalContent(book) {
      const color = SERIES_COLORS[book.series_key] || "var(--other-c)";

      // Cover column
      let coverHtml;
      if (book.cover_url) {
        coverHtml = `<img class="modal-cover"
          src="${escHtml(book.cover_url)}"
          alt="Portada: ${escHtml(book.title)}"
          loading="lazy">`;
      } else {
        coverHtml = `<div class="modal-cover-placeholder" style="background:${color}">
          <span style="font-family:Fraunces,serif;font-size:1rem;font-weight:700;margin-bottom:8px">${escHtml(book.title)}</span>
          <span style="font-size:.75rem;opacity:.75">${escHtml(shortCreator(book))}</span>
        </div>`;
      }

      const creditLine = book.source_label
        ? `<p class="modal-cover-credit">Portada: ${escHtml(book.source_label)}</p>`
        : "";

      // Meta rows
      const metaRows = [];
      const addMeta = (label, value) => {
        if (value) metaRows.push(`<dt>${label}</dt><dd>${escHtml(value)}</dd>`);
      };
      if (book.editors.length) addMeta("Editores", book.editors.join(", "));
      if (book.translators.length) addMeta("Traductores", book.translators.join(", "));
      if (book.contributors.length) addMeta("Colaboradores", book.contributors.join(", "));
      addMeta("Serie", book.series_number != null
        ? `${book.series} (${book.series_badge})`
        : book.series);
      addMeta("Editorial", book.publisher_display);
      addMeta("Año", book.year_label);
      if (book.edition) addMeta("Edición", book.edition + ".ª ed.");
      addMeta("Páginas", book.pages_label);
      addMeta("Idioma", book.language && book.language !== "sin dato" ? book.language : "");
      if (book.primary_isbn) addMeta("ISBN", book.primary_isbn);
      if (book.library_catalog) addMeta("Catálogo", book.library_catalog);

      // Subjects
      let subjectsHtml = "";
      if (book.subjects && book.subjects.length) {
        const tags = book.subjects.map(s => `<span class="modal-tag">${escHtml(s)}</span>`).join("");
        subjectsHtml = `<p class="modal-section-title">Descriptores</p>
          <div class="modal-tags">${tags}</div>`;
      }

      // Abstract
      let abstractHtml = "";
      if (book.abstract) {
        abstractHtml = `<p class="modal-section-title">Resumen</p>
          <p class="modal-abstract">${escHtml(book.abstract)}</p>`;
      }

      // Attachments
      let attachHtml = "";
      if (book.attachments && book.attachments.length) {
        const items = book.attachments
          .map(a => `<span class="modal-attachment-item">${escHtml(a)}</span>`)
          .join("<br>");
        attachHtml = `<p class="modal-section-title">Archivos adjuntos</p>
          <div class="modal-attachments">${items}</div>`;
      }

      // Subtitle / short title
      const subtitleHtml = book.short_title && book.short_title !== book.title
        ? `<p class="modal-subtitle">${escHtml(book.short_title)}</p>`
        : "";

      return `
        <div class="modal-cover-col">
          <div style="position:sticky;top:16px">
            ${coverHtml}
            ${creditLine}
            <div class="modal-nav">
              <button class="modal-nav-btn" id="modalPrev">← anterior</button>
              <button class="modal-nav-btn" id="modalNext">siguiente →</button>
            </div>
          </div>
        </div>
        <div class="modal-detail-col">
          <p class="modal-series-line">${escHtml(book.series)}${book.series_number != null ? " · " + book.series_badge : ""}</p>
          <h2 class="modal-title">${escHtml(book.title)}</h2>
          ${subtitleHtml}
          <div class="modal-apa">${buildApaHtml(book)}</div>
          <dl class="modal-meta">${metaRows.join("")}</dl>
          ${subjectsHtml}
          ${abstractHtml}
          ${attachHtml}
        </div>`;
    }

    function openModal(filteredIdx) {
      state.activeIndex = filteredIdx;
      const book = state.filtered[filteredIdx];
      const backdrop = document.getElementById("modalBackdrop");
      const body = document.getElementById("modalBody");

      body.innerHTML = buildModalContent(book);
      backdrop.classList.remove("is-hidden");
      document.body.style.overflow = "hidden";
      document.getElementById("modal").scrollTop = 0;

      // Nav buttons
      const prevBtn = document.getElementById("modalPrev");
      const nextBtn = document.getElementById("modalNext");
      prevBtn.disabled = filteredIdx <= 0;
      nextBtn.disabled = filteredIdx >= state.filtered.length - 1;
      prevBtn.addEventListener("click", () => openModal(filteredIdx - 1));
      nextBtn.addEventListener("click", () => openModal(filteredIdx + 1));
    }

    function closeModal() {
      document.getElementById("modalBackdrop").classList.add("is-hidden");
      document.body.style.overflow = "";
      state.activeIndex = -1;
    }

    /* ── Event wiring ──────────────────────────────── */
    document.getElementById("modalBackdrop").addEventListener("click", e => {
      if (e.target === e.currentTarget) closeModal();
    });
    document.getElementById("modalClose").addEventListener("click", closeModal);

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") { closeModal(); return; }
      if (state.activeIndex < 0) return;
      if (e.key === "ArrowLeft"  && state.activeIndex > 0)
        openModal(state.activeIndex - 1);
      if (e.key === "ArrowRight" && state.activeIndex < state.filtered.length - 1)
        openModal(state.activeIndex + 1);
    });

    // Filter buttons
    document.getElementById("filterBar").addEventListener("click", e => {
      const btn = e.target.closest(".filter-btn");
      if (!btn) return;
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("is-active"));
      btn.classList.add("is-active");
      state.series = btn.dataset.series;
      renderGrid();
    });

    // Search
    let searchTimer;
    document.getElementById("searchInput").addEventListener("input", e => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.query = e.target.value.trim();
        renderGrid();
      }, 180);
    });

    // Sort
    document.getElementById("sortSelect").addEventListener("change", e => {
      state.sort = e.target.value;
      renderGrid();
    });

    /* ── Init ──────────────────────────────────────── */
    renderGrid();
  </script>
</body>
</html>
